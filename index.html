<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Greater Noida</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">Fix Greater Noida</div>
  <div class="subtitle">Document. Expose. Fix.</div>
</header>

<main class="container">

  <!-- GRID: issues display here -->
  <section>
    <div class="section-title">Latest Issues</div>
    <div class="grid" id="grid"></div>
  </section>

  <button class="add-btn" onclick="addCard()">+ Add Issue</button>

  <!-- REPORT BOX -->
  <section class="report-box">
    <h2>Tell Us About Some Issues</h2>
    <p class="muted">Your report will help us highlight real problems in the city.</p>
    <textarea id="userInput" placeholder="Describe the issue you are facing..."></textarea>
    <button onclick="submitIssue()">Submit</button>
    <p id="response"></p>
  </section>

</main>

<footer class="footer">
  Built for civic accountability • Greater Noida
</footer>

<script src="script.js"></script>
</body>
</html>
