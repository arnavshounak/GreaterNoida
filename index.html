<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Greater Noida</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  Fix Greater Noida - Report Issues
</header>

<div class="container">

  <div class="grid" id="grid"></div>

  <button class="add-btn" onclick="addCard()">+ Add Issue</button>

  <div class="report-box">
    <h2>Tell Us About Some Issues</h2>
    <textarea id="userInput" placeholder="Describe the issue you are facing..."></textarea>
    <button onclick="submitIssue()">Submit</button>
    <p id="response"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
